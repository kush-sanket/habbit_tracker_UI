<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker â€” Leaderboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script>
    (function(){
      const h = new Date().getHours();
      document.documentElement.className = (h >= 6 && h < 18) ? 'day-theme' : 'night-theme';
    })();
  </script>
</head>
<body class="lb-page">

  <!-- Background scene -->
  <div class="bg-scene" id="bgScene"></div>

  <!-- Nav -->
  <nav class="lb-nav d-flex align-items-center justify-content-between">
    <span class="fw-bold fs-5">ðŸ† Leaderboard</span>
    <div class="d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-success" style="border-radius:9px;">ðŸŒ³ My Tree</a>
      <button id="lbLogoutBtn" class="btn btn-sm btn-outline-danger" style="border-radius:9px;">Logout</button>
    </div>
  </nav>

  <div class="lb-wrap">
    <div class="lb-card">

      <!-- Controls -->
      <div class="lb-controls">
        <label class="me-1">Sort by:</label>
        <button class="btn btn-sm sort-btn active" data-sort="score">â­ Score</button>
        <button class="btn btn-sm sort-btn" data-sort="completed">âœ… Completed â†“</button>
        <button class="btn btn-sm sort-btn" data-sort="total_tasks">ðŸ“‹ Total â†“</button>
        <button class="btn btn-sm sort-btn" data-sort="streak">ðŸ”¥ Streak â†“</button>
        <button class="btn btn-sm sort-btn" data-sort="completed_asc">âœ… Completed â†‘</button>
        <button class="btn btn-sm sort-btn" data-sort="streak_asc">ðŸ”¥ Streak â†‘</button>
        <button class="btn btn-sm sort-btn" data-sort="score_asc">â­ Score â†‘</button>
        <div class="ms-auto d-flex align-items-center gap-2">
          <label for="lbLimit">Show:</label>
          <select id="lbLimit" class="form-select form-select-sm" style="width:80px;border-radius:9px;">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <!-- Loading / Empty -->
      <div id="lbLoading" class="d-none">
        <div class="spinner-border me-2" role="status"></div>Loadingâ€¦
      </div>
      <div id="lbEmpty" class="d-none">
        No public accounts yet. Be the first to go public! ðŸŒ±
      </div>

      <!-- Table -->
      <div id="lbTableWrap">
        <table class="lb-table">
          <thead>
            <tr>
              <th style="width:52px">#</th>
              <th>Player</th>
              <th class="text-center">Score</th>
              <th class="text-center">Completed</th>
              <th class="text-center">Total Tasks</th>
              <th class="text-center">Branches</th>
              <th class="text-center">ðŸ”¥ Best</th>
              <th class="text-center">ðŸ”¥ Now</th>
            </tr>
          </thead>
          <tbody id="lbBody"></tbody>
        </table>
      </div>

    </div>

    <p class="text-center lb-footer small mt-3">
      Only accounts with <strong>Public</strong> profile are shown.
      Switch yours public from the <a href="dashboard.html">dashboard</a> to appear here.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
  // Apply theme to body
  (function(){
    const isDay = document.documentElement.classList.contains('day-theme');
    document.body.classList.add(isDay ? 'day-theme' : 'night-theme');
    const scene = document.getElementById('bgScene');
    if (isDay) {
      for (let i = 1; i <= 4; i++) {
        const c = document.createElement('div');
        c.className = `cloud cloud-${i}`;
        scene.appendChild(c);
      }
    } else {
      const moon = document.createElement('div'); moon.className = 'moon'; scene.appendChild(moon);
      for (let i = 0; i < 60; i++) {
        const s = document.createElement('div'); s.className = 'star';
        s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*75}%;--dur:${2+Math.random()*3}s;--delay:${Math.random()*3}s;width:${Math.random()>0.7?4:2}px;height:${Math.random()>0.7?4:2}px;`;
        scene.appendChild(s);
      }
    }
  })();

  $(function () {
    if (!Auth.isLoggedIn()) { window.location.href = 'index.html'; return; }

    const currentUser = Auth.getUser();
    let _sort = 'score', _limit = 50;

    $('#lbLogoutBtn').on('click', async function () {
      try { await API.logout(); } catch {}
      Auth.clear();
      window.location.href = 'index.html';
    });

    $('.sort-btn').on('click', function () {
      _sort = $(this).data('sort');
      $('.sort-btn').removeClass('active');
      $(this).addClass('active');
      loadLeaderboard();
    });

    $('#lbLimit').on('change', function () {
      _limit = parseInt($(this).val(), 10);
      loadLeaderboard();
    });

    async function loadLeaderboard() {
      $('#lbLoading').removeClass('d-none');
      $('#lbEmpty').addClass('d-none');
      $('#lbTableWrap').hide();
      try {
        const data = await API.getLeaderboard(_sort, _limit);
        renderTable(Array.isArray(data) ? data : []);
      } catch (err) {
        console.error('Leaderboard error', err);
        $('#lbEmpty').text('Failed to load leaderboard. Please try again.').removeClass('d-none');
      } finally {
        $('#lbLoading').addClass('d-none');
      }
    }

    function renderTable(entries) {
      if (!entries.length) { $('#lbTableWrap').hide(); $('#lbEmpty').removeClass('d-none'); return; }
      const rows = entries.map(e => {
        const isYou = currentUser && e.username === currentUser.username;
        const youBadge = isYou ? '<span class="you-badge">YOU</span>' : '';
        const rankClass = e.rank <= 3 ? `rank-${e.rank}` : '';
        return `<tr class="${isYou ? 'you-row' : ''} ${rankClass}">
          <td><span class="rank-badge">${e.rank}</span></td>
          <td><strong>${_esc(e.username)}</strong>${youBadge}</td>
          <td class="text-center"><span class="score-pill">${e.score}</span></td>
          <td class="text-center" style="color:#4caf50;font-weight:700;">${e.total_completed}</td>
          <td class="text-center">${e.total_tasks}</td>
          <td class="text-center">${e.branch_count}</td>
          <td class="text-center" style="color:#ff9800;font-weight:600;">${e.highest_streak}</td>
          <td class="text-center">${e.current_streak}</td>
        </tr>`;
      }).join('');
      $('#lbBody').html(rows);
      $('#lbTableWrap').show();
    }

    function _esc(str) { return $('<span>').text(str).html(); }

    loadLeaderboard();
  });
  </script>
</body>
</html>
