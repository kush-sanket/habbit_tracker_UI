<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker — Leaderboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { background: #0d1117; color: #e6edf3; min-height: 100vh; }

    .lb-nav  { background: #161b22; border-bottom: 1px solid #30363d; }
    .lb-wrap { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }

    .lb-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    .lb-controls {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #21262d;
      background: #0d1117;
    }

    .lb-controls label { color: #8b949e; font-size: .85rem; margin-bottom: 0; }

    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table thead th {
      background: #21262d;
      color: #8b949e;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: .65rem 1rem;
      border-bottom: 1px solid #30363d;
    }
    .lb-table tbody tr {
      transition: background .15s;
      border-bottom: 1px solid #21262d;
    }
    .lb-table tbody tr:hover { background: #1c2230; }
    .lb-table td {
      padding: .7rem 1rem;
      font-size: .9rem;
      vertical-align: middle;
    }

    /* Rank medals */
    .rank-1 .rank-badge { background: #ffd700; color: #000; }
    .rank-2 .rank-badge { background: #c0c0c0; color: #000; }
    .rank-3 .rank-badge { background: #cd7f32; color: #fff; }
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #30363d;
      color: #e6edf3;
      font-weight: 700;
      font-size: .85rem;
    }

    .you-row td { background: rgba(46,160,67,.12); }
    .you-badge {
      font-size: .7rem;
      background: #2ea043;
      color: #fff;
      padding: 1px 6px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .score-pill {
      background: #1f6feb;
      color: #fff;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
    }

    #lbEmpty, #lbLoading { text-align: center; padding: 3rem; color: #8b949e; }
    #lbLoading .spinner-border { width: 1.4rem; height: 1.4rem; }

    /* Active sort button highlight */
    .sort-btn.active { background: #238636; border-color: #238636; color: #fff; }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="lb-nav px-3 py-2 d-flex align-items-center justify-content-between">
    <span class="fw-bold fs-5">🏆 Leaderboard</span>
    <div class="d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-success">🌳 My Tree</a>
      <button id="lbLogoutBtn" class="btn btn-sm btn-outline-danger">Logout</button>
    </div>
  </nav>

  <div class="lb-wrap">
    <div class="lb-card">

      <!-- Controls -->
      <div class="lb-controls">
        <label class="me-1">Sort by:</label>

        <button class="btn btn-sm btn-outline-secondary sort-btn active" data-sort="score">
          ⭐ Score
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="completed">
          ✅ Completed ↓
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="total_tasks">
          📋 Total Tasks ↓
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="streak">
          🔥 Streak ↓
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="completed_asc">
          ✅ Completed ↑
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="streak_asc">
          🔥 Streak ↑
        </button>
        <button class="btn btn-sm btn-outline-secondary sort-btn" data-sort="score_asc">
          ⭐ Score ↑
        </button>

        <div class="ms-auto d-flex align-items-center gap-2">
          <label for="lbLimit">Show:</label>
          <select id="lbLimit" class="form-select form-select-sm" style="width:80px">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div id="lbLoading" class="d-none">
        <div class="spinner-border text-success me-2" role="status"></div>
        Loading…
      </div>
      <div id="lbEmpty" class="d-none">
        No public accounts yet. Be the first to go public! 🌱
      </div>

      <div id="lbTableWrap">
        <table class="lb-table">
          <thead>
            <tr>
              <th style="width:52px">#</th>
              <th>Player</th>
              <th class="text-center">Score</th>
              <th class="text-center">Completed</th>
              <th class="text-center">Total Tasks</th>
              <th class="text-center">Branches</th>
              <th class="text-center">🔥 Best</th>
              <th class="text-center">🔥 Now</th>
            </tr>
          </thead>
          <tbody id="lbBody">
          </tbody>
        </table>
      </div>

    </div>

    <!-- Privacy notice -->
    <p class="text-center text-muted small mt-3">
      Only accounts with <strong>Public</strong> profile are shown.
      Switch yours public from the <a href="dashboard.html" class="text-success">dashboard</a> to appear here.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
  $(function () {
    // Guard
    if (!Auth.isLoggedIn()) {
      window.location.href = 'index.html';
      return;
    }

    const currentUser = Auth.getUser();
    let _sort  = 'score';
    let _limit = 50;

    // ── Logout ─────────────────────────────────────────────────────────────
    $('#lbLogoutBtn').on('click', async function () {
      try { await API.logout(); } catch { /* swallow */ }
      Auth.clear();
      window.location.href = 'index.html';
    });

    // ── Sort buttons ───────────────────────────────────────────────────────
    $('.sort-btn').on('click', function () {
      _sort = $(this).data('sort');
      $('.sort-btn').removeClass('active');
      $(this).addClass('active');
      loadLeaderboard();
    });

    // ── Limit select ───────────────────────────────────────────────────────
    $('#lbLimit').on('change', function () {
      _limit = parseInt($(this).val(), 10);
      loadLeaderboard();
    });

    // ── Load data ──────────────────────────────────────────────────────────
    async function loadLeaderboard() {
      $('#lbLoading').removeClass('d-none');
      $('#lbEmpty').addClass('d-none');
      $('#lbTableWrap').hide();

      try {
        const data = await API.getLeaderboard(_sort, _limit);
        renderTable(Array.isArray(data) ? data : []);
      } catch (err) {
        console.error('Leaderboard error', err);
        $('#lbEmpty').text('Failed to load leaderboard. Please try again.').removeClass('d-none');
      } finally {
        $('#lbLoading').addClass('d-none');
      }
    }

    function renderTable(entries) {
      if (entries.length === 0) {
        $('#lbTableWrap').hide();
        $('#lbEmpty').removeClass('d-none');
        return;
      }

      const rows = entries.map(e => {
        const isYou  = currentUser && e.username === currentUser.username;
        const youBadge = isYou ? '<span class="you-badge">YOU</span>' : '';
        const rankClass = e.rank <= 3 ? `rank-${e.rank}` : '';
        return `
          <tr class="${isYou ? 'you-row' : ''} ${rankClass}">
            <td><span class="rank-badge">${e.rank}</span></td>
            <td>
              <strong>${_esc(e.username)}</strong>${youBadge}
            </td>
            <td class="text-center"><span class="score-pill">${e.score}</span></td>
            <td class="text-center text-success fw-bold">${e.total_completed}</td>
            <td class="text-center">${e.total_tasks}</td>
            <td class="text-center">${e.branch_count}</td>
            <td class="text-center text-warning">${e.highest_streak}</td>
            <td class="text-center">${e.current_streak}</td>
          </tr>`;
      }).join('');

      $('#lbBody').html(rows);
      $('#lbTableWrap').show();
    }

    function _esc(str) {
      return $('<span>').text(str).html();
    }

    // Initial load
    loadLeaderboard();
  });
  </script>
</body>
</html>
