<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script>
    // Apply theme before paint to avoid flash
    (function(){
      const h = new Date().getHours();
      document.documentElement.className = (h >= 6 && h < 18) ? 'day-theme' : 'night-theme';
    })();
  </script>
</head>
<body class="auth-page">

  <!-- Animated background scene -->
  <div class="bg-scene" id="bgScene"></div>

  <!-- Auth card -->
  <div class="auth-wrapper">
    <div class="auth-card card shadow-lg">
      <div class="text-center mb-4">
        <div class="auth-logo mb-2">🌳</div>
        <h3 class="fw-bold">HabitTracker</h3>
        <p class="text-muted small">Grow your habits, grow your tree.</p>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" data-tab="login">Login</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="register">Register</button>
        </li>
      </ul>

      <!-- Alert -->
      <div id="authAlert" class="alert d-none" role="alert"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-success w-100" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="d-none">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="regUsername" class="form-control" placeholder="cooluser" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="regPassword2" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-success w-100" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Build background scene
    (function () {
      const isDay = document.documentElement.classList.contains('day-theme');
      const scene = document.getElementById('bgScene');
      document.body.classList.add(isDay ? 'day-theme' : 'night-theme');

      if (isDay) {
        // Clouds
        for (let i = 1; i <= 4; i++) {
          const c = document.createElement('div');
          c.className = `cloud cloud-${i}`;
          scene.appendChild(c);
        }
        // Sun
        const sun = document.createElement('div');
        sun.style.cssText = 'position:absolute;top:8%;left:10%;width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,#fffde7,#ffd54f);box-shadow:0 0 40px 16px rgba(255,213,79,.45),0 0 80px 30px rgba(255,213,79,.2);animation:moonGlow 4s ease-in-out infinite;';
        scene.appendChild(sun);
      } else {
        // Moon
        const moon = document.createElement('div');
        moon.className = 'moon';
        scene.appendChild(moon);
        // Stars
        for (let i = 0; i < 60; i++) {
          const s = document.createElement('div');
          s.className = 'star';
          s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*75}%;--dur:${2+Math.random()*3}s;--delay:${Math.random()*3}s;width:${Math.random()>0.7?4:2}px;height:${Math.random()>0.7?4:2}px;`;
          scene.appendChild(s);
        }
      }
    })();
  </script>
</body>
</html>
