<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/tree.css" />
</head>
<body class="dashboard-page">

  <!-- Top Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark px-3 py-2 d-flex align-items-center justify-content-between">
    <span class="navbar-brand mb-0 fw-bold">🌳 HabitTracker</span>
    <div class="d-flex align-items-center gap-3">
      <span id="stageLabel" class="badge bg-success fs-6"></span>
      <span id="streakBadge" class="text-warning fw-bold fs-6">🔥 —</span>
      <span id="highestStreakBadge" class="text-light small">Best: —</span>
      <span id="usernameLabel" class="text-light small"></span>
      <a href="leaderboard.html" class="btn btn-sm btn-outline-warning">🏆 Leaderboard</a>
      <button id="privacyBtn" class="btn btn-sm btn-outline-light">🔒 Public</button>
      <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Logout</button>
    </div>
  </nav>

  <!-- Main layout -->
  <div class="dashboard-layout d-flex">
    <!-- Left: SVG Tree Canvas -->
    <div class="tree-panel flex-grow-1 position-relative">
      <div id="treeLoading" class="tree-loading d-flex align-items-center justify-content-center">
        <div class="spinner-border text-success" role="status"></div>
        <span class="ms-2 text-muted">Growing your tree…</span>
      </div>
      <svg id="tree-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="treeEmpty" class="tree-empty d-none text-center text-muted p-5">
        <div style="font-size:4rem">🌱</div>
        <p class="mt-2">No branches yet. Create your first habit!</p>
        <button class="btn btn-success" id="emptyAddBranchBtn">+ Add Branch</button>
      </div>
    </div>

    <!-- Right: Detail Panel (offcanvas-style side drawer) -->
    <div id="detailPanel" class="detail-panel d-none flex-shrink-0">
      <div class="panel-header d-flex align-items-center justify-content-between p-3 border-bottom">
        <h6 id="panelTitle" class="mb-0 fw-bold">Branch Details</h6>
        <button class="btn-close" id="closePanelBtn" aria-label="Close"></button>
      </div>
      <div id="panelBody" class="panel-body p-3 overflow-auto">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>

  <!-- FAB: Add Branch -->
  <button id="fabAddBranch" class="fab-btn btn btn-success rounded-circle shadow" title="Add Branch">＋</button>

  <!-- Modal: Add Branch -->
  <div class="modal fade" id="addBranchModal" tabindex="-1" aria-labelledby="addBranchModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addBranchModalLabel">Add New Branch</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="branchModalAlert" class="alert d-none"></div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="branchCategory" class="form-select"></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Branch Name</label>
            <input type="text" id="branchName" class="form-control" placeholder="e.g. Morning Run" />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="branchDesc" class="form-control" rows="2" placeholder="Optional description"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="saveBranchBtn">Create Branch</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Add Task -->
  <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addTaskModalLabel">Add Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="taskModalAlert" class="alert d-none"></div>
          <input type="hidden" id="taskBranchId" />
          <div class="mb-3">
            <label class="form-label">Task Title</label>
            <input type="text" id="taskTitle" class="form-control" placeholder="e.g. 5km run" />
          </div>
          <div class="mb-3">
            <label class="form-label">Frequency</label>
            <select id="taskFrequency" class="form-select">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" id="taskDueDate" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="saveTaskBtn">Create Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Reroute Task -->
  <div class="modal fade" id="rerouteModal" tabindex="-1" aria-labelledby="rerouteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="rerouteModalLabel">Reroute Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="rerouteModalAlert" class="alert d-none"></div>
          <input type="hidden" id="rerouteTaskId" />
          <div class="mb-3">
            <label class="form-label">New Title</label>
            <input type="text" id="rerouteTitle" class="form-control" placeholder="Updated task title" />
          </div>
          <div class="mb-3">
            <label class="form-label">Reason</label>
            <textarea id="rerouteReason" class="form-control" rows="2" placeholder="Why are you rerouting?"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">New Due Date</label>
            <input type="date" id="rerouteDueDate" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-warning" id="confirmRerouteBtn">Reroute</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tree-renderer.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
