<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/tree.css" />
  <script>
    (function(){
      const h = new Date().getHours();
      const t = (h >= 6 && h < 18) ? 'day-theme' : 'night-theme';
      document.documentElement.className = t;
    })();
  </script>
</head>
<body class="dashboard-page">

  <!-- Background scene -->
  <div class="bg-scene" id="bgScene"></div>

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="app-navbar d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <button id="sidebarToggleMobile" class="btn btn-sm me-1 d-lg-none"
              style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);border-radius:8px;">☰</button>
      <span class="navbar-brand">🌳 HabitTracker</span>
      <span id="stageLabel" class="stage-badge d-none d-sm-inline"></span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span id="streakBadge" class="streak-badge">🔥 —</span>
      <span id="highestStreakBadge" class="nav-meta d-none d-md-inline">Best: —</span>
      <span id="usernameLabel" class="nav-meta d-none d-md-inline"></span>
      <a href="leaderboard.html" class="btn btn-sm btn-outline-warning" style="border-radius:8px;font-size:.8rem;">🏆</a>
      <a href="analytics.html" class="btn btn-sm btn-outline-info" style="border-radius:8px;font-size:.8rem;">📊 Stats</a>
      <button id="privacyBtn" class="btn btn-sm" style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);border-radius:8px;font-size:.8rem;">🔒 Private</button>
      <button id="logoutBtn" class="btn btn-sm btn-outline-danger" style="border-radius:8px;font-size:.8rem;">Logout</button>
    </div>
  </nav>

  <!-- ── App Body ────────────────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- Left Sidebar -->
    <div class="app-sidebar" id="appSidebar">
      <div class="sidebar-header">
        <h6>🌿 My Habits</h6>
        <button class="btn btn-sm d-lg-none" id="closeSidebar"
                style="background:transparent;border:none;font-size:1.2rem;color:var(--text-muted);">✕</button>
      </div>
      <div class="sidebar-scroll">
        <!-- Motivational text -->
        <div id="motivationText" class="text-center py-2 px-3 mb-2" style="font-size:.82rem;color:var(--text-muted);font-style:italic;"></div>
        <!-- Stem strength bar -->
        <div id="stemStrengthWrap" class="px-2 mb-3 d-none">
          <div class="d-flex justify-content-between mb-1" style="font-size:.78rem;color:var(--text-muted);">
            <span>Tree Strength</span>
            <span id="stemStrengthPct"></span>
          </div>
          <div class="branch-progress">
            <div class="branch-progress-bar" id="stemStrengthBar" style="background:var(--accent-green);"></div>
          </div>
        </div>
        <!-- Accordion -->
        <div class="accordion sidebar-accordion" id="sidebarAccordion">
          <div class="text-center py-4" style="color:var(--text-muted);font-size:.85rem;">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading…
          </div>
        </div>
      </div>
    </div>
    <!-- Sidebar overlay (mobile) -->
    <div id="sidebarOverlay" class="d-none"
         style="position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.4);"></div>

    <!-- Main area: tree + detail panel -->
    <div class="main-area">

      <!-- Tree Panel -->
      <div class="tree-panel flex-grow-1 position-relative">
        <div id="treeLoading" class="tree-loading d-flex align-items-center justify-content-center">
          <div class="spinner-border text-success" role="status"></div>
          <span class="ms-2" style="color:var(--text-secondary);">Growing your tree…</span>
        </div>
        <svg id="tree-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="treeEmpty" class="tree-empty d-none text-center p-5">
          <div class="tree-empty-icon">🌱</div>
          <p>No branches yet. Create your first habit!</p>
          <button class="btn btn-success px-4" id="emptyAddBranchBtn" style="border-radius:12px;">+ Add Branch</button>
        </div>
      </div>

      <!-- Detail Panel -->
      <div id="detailPanel" class="detail-panel d-none flex-shrink-0">
        <div class="panel-header">
          <h6 id="panelTitle" class="mb-0 fw-bold">Details</h6>
          <button class="btn-close" id="closePanelBtn" aria-label="Close"></button>
        </div>
        <div id="panelBody" class="panel-body p-3 overflow-auto">
          <!-- Dynamically populated -->
        </div>
      </div>

    </div><!-- /.main-area -->
  </div><!-- /.app-body -->

  <!-- FAB: Add Branch -->
  <button id="fabAddBranch" class="fab-btn" title="Add Branch">＋</button>

  <!-- Sidebar mobile toggle (floating) -->
  <button id="sidebarToggle" title="Toggle sidebar">🌿</button>

  <!-- ── Modal: Add Branch ───────────────────────────────────────────────── -->
  <div class="modal fade" id="addBranchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">🌿 Add New Branch</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="branchModalAlert" class="alert d-none"></div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="branchCategory" class="form-select"></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Branch Name</label>
            <input type="text" id="branchName" class="form-control" placeholder="e.g. Morning Run" />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="branchDesc" class="form-control" rows="2" placeholder="Optional description"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:9px;">Cancel</button>
          <button type="button" class="btn btn-success" id="saveBranchBtn" style="border-radius:9px;">Create Branch</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Add Task ────────────────────────────────────────────────── -->
  <div class="modal fade" id="addTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">🍃 Add Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="taskModalAlert" class="alert d-none"></div>
          <input type="hidden" id="taskBranchId" />
          <div class="mb-3">
            <label class="form-label">Task Title</label>
            <input type="text" id="taskTitle" class="form-control" placeholder="e.g. 5km run" />
          </div>
          <div class="mb-3">
            <label class="form-label">Frequency</label>
            <select id="taskFrequency" class="form-select">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" id="taskDueDate" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:9px;">Cancel</button>
          <button type="button" class="btn btn-success" id="saveTaskBtn" style="border-radius:9px;">Create Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Reroute Task ────────────────────────────────────────────── -->
  <div class="modal fade" id="rerouteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">🔀 Reroute Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="rerouteModalAlert" class="alert d-none"></div>
          <input type="hidden" id="rerouteTaskId" />
          <div class="mb-3">
            <label class="form-label">New Title</label>
            <input type="text" id="rerouteTitle" class="form-control" placeholder="Updated task title" />
          </div>
          <div class="mb-3">
            <label class="form-label">Reason</label>
            <textarea id="rerouteReason" class="form-control" rows="2" placeholder="Why are you rerouting?"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">New Due Date</label>
            <input type="date" id="rerouteDueDate" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:9px;">Cancel</button>
          <button type="button" class="btn btn-warning" id="confirmRerouteBtn" style="border-radius:9px;">Reroute</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tree-renderer.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // Apply theme class to body
    (function () {
      const isDay = document.documentElement.classList.contains('day-theme');
      document.body.classList.add(isDay ? 'day-theme' : 'night-theme');
      const scene = document.getElementById('bgScene');
      if (isDay) {
        for (let i = 1; i <= 4; i++) {
          const c = document.createElement('div');
          c.className = `cloud cloud-${i}`;
          scene.appendChild(c);
        }
      } else {
        const moon = document.createElement('div');
        moon.className = 'moon';
        scene.appendChild(moon);
        for (let i = 0; i < 80; i++) {
          const s = document.createElement('div');
          s.className = 'star';
          s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*70}%;--dur:${2+Math.random()*3}s;--delay:${Math.random()*4}s;width:${Math.random()>0.7?4:2}px;height:${Math.random()>0.7?4:2}px;`;
          scene.appendChild(s);
        }
      }
    })();

    // Mobile sidebar toggle
    function openSidebar()  {
      document.getElementById('appSidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.remove('d-none');
    }
    function closeSidebar() {
      document.getElementById('appSidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.add('d-none');
    }
    document.getElementById('sidebarToggle').addEventListener('click', openSidebar);
    document.getElementById('sidebarToggleMobile').addEventListener('click', openSidebar);
    document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

    // Motivational messages
    const msgs = [
      '🌱 Your tree is growing!',
      '🔥 Keep your streak alive!',
      '🌿 Every task is a new leaf.',
      '🌳 Consistency builds forests.',
      '✨ One habit at a time.',
      '💪 Small wins, big growth.',
    ];
    document.getElementById('motivationText').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  </script>
</body>
</html>
